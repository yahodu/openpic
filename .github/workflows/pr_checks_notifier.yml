name: PR Failed Checks Notifier

on:
  schedule:
    - cron: '*/20 * * * *'   # every 20 minutes

jobs:
  notify-failed-checks:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      checks: read

    steps:
      - name: Check PRs and notify Slack
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Fetch all open, non-draft PRs
            const { data: pullRequests } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const readyPRs = pullRequests.filter(pr => !pr.draft);
            console.log(`Found ${readyPRs.length} ready (non-draft) PRs`);

            const failedPRReports = [];

            for (const pr of readyPRs) {
              const sha = pr.head.sha;

              // Get all check runs for the latest commit on this PR
              const { data: checkRunsData } = await github.rest.checks.listForRef({
                owner,
                repo,
                ref: sha,
                per_page: 100,
              });

              const failedChecks = checkRunsData.check_runs.filter(
                run =>
                  run.status === 'completed' &&
                  (run.conclusion === 'failure' || run.conclusion === 'timed_out' || run.conclusion === 'cancelled')
              );

              if (failedChecks.length > 0) {
                failedPRReports.push({ pr, failedChecks });
              }
            }

            if (failedPRReports.length === 0) {
              console.log('No PRs with failed checks. No Slack message sent.');
              return;
            }

            // Build Slack message blocks
            const blocks = [
              {
                type: 'header',
                text: {
                  type: 'plain_text',
                  text: '🚨 PRs with Failed Checks',
                  emoji: true,
                },
              },
              {
                type: 'context',
                elements: [
                  {
                    type: 'mrkdwn',
                    text: `*Repo:* ${owner}/${repo}  •  ${new Date().toUTCString()}`,
                  },
                ],
              },
              { type: 'divider' },
            ];

            for (const { pr, failedChecks } of failedPRReports) {
              const checkList = failedChecks
                .map(c => {
                  const icon =
                    c.conclusion === 'failure' ? '❌' :
                    c.conclusion === 'timed_out' ? '⏱️' : '🚫';
                  return `${icon} *${c.name}* — <${c.html_url}|view logs>`;
                })
                .join('\n');

              blocks.push({
                type: 'section',
                text: {
                  type: 'mrkdwn',
                  text: `*PR #${pr.number}:* <${pr.html_url}|${pr.title}>\n*Author:* ${pr.user.login}\n\n*Failed checks:*\n${checkList}`,
                },
              });
              blocks.push({ type: 'divider' });
            }

            // Send to Slack
            const webhookUrl = process.env.SLACK_WEBHOOK_URL;
            const response = await fetch(webhookUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ blocks }),
            });

            if (!response.ok) {
              throw new Error(`Slack webhook failed: ${response.status} ${await response.text()}`);
            }

            console.log(`Notified Slack about ${failedPRReports.length} PR(s) with failed checks.`);
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
