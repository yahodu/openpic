name: Production Failure Notifier

on:
  repository_dispatch:
    types: [prod-deploy-failed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack alert
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚨 Production Deployment Failed",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*The latest Vercel production deployment has failed and is still unresolved.*\n\nThis alert will repeat every 15 minutes until a successful deployment occurs.\n\n<https://github.com/${{ github.repository }}/deployments|View Deployments>"
                  }
                }
              ]
            }'
