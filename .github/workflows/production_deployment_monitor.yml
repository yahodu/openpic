name: Vercel Production Deploy Monitor

on:
  deployment_status:

permissions:
  contents: read

jobs:
  handle-failure:
    if: |
      github.event.deployment_status.state == 'failure' &&
      github.event.deployment_status.environment == 'Production'
    runs-on: ubuntu-latest
    steps:
      - name: Send immediate Slack failure alert
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚨 Production Deployment Failed",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*A Vercel production deployment has just failed.*\n\nYou will receive a reminder every 15 minutes until a successful deployment occurs.\n\n<https://github.com/${{ github.repository }}/deployments|View Deployments>"
                  }
                }
              ]
            }'

      - name: Create cron job on cron-job.org
        run: |
          # Clean up any existing job with the same name (idempotency)
          JOBS=$(curl -s -X GET "https://api.cron-job.org/jobs" \
            -H "Authorization: Bearer ${{ secrets.CRON_JOB_ORG_API_KEY }}" \
            -H "Content-Type: application/json")

          EXISTING_ID=$(echo "$JOBS" | jq -r '
            .jobs[] | select(.title == "vercel-prod-failure-notifier-job") | .jobId
          ' | head -n 1)

          if [ -n "$EXISTING_ID" ]; then
            curl -s -X DELETE "https://api.cron-job.org/jobs/$EXISTING_ID" \
              -H "Authorization: Bearer ${{ secrets.CRON_JOB_ORG_API_KEY }}" \
              -H "Content-Type: application/json"
            echo "Deleted stale cron job: $EXISTING_ID"
          fi

          # Create new cron job (every 15 min, runs until deleted by success handler)
          curl -s -X PUT "https://api.cron-job.org/jobs" \
            -H "Authorization: Bearer ${{ secrets.CRON_JOB_ORG_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "job": {
                "title": "vercel-prod-failure-notifier-job",
                "url": "https://api.github.com/repos/${{ github.repository }}/dispatches",
                "enabled": true,
                "saveResponses": true,
                "requestMethod": 1,
                "extendedData": {
                  "headers": {
                    "Authorization": "Bearer ${{ secrets.GH_PAT }}",
                    "Accept": "application/vnd.github+json",
                    "Content-Type": "application/json"
                  },
                  "body": "{\"event_type\": \"prod-deploy-failed\"}"
                },
                "schedule": {
                  "timezone": "Asia/Kolkata",
                  "expiresAt": 0,
                  "hours": [-1],
                  "mdays": [-1],
                  "months": [-1],
                  "wdays": [-1],
                  "minutes": [0, 15, 30, 45]
                }
              }
            }'
          echo "Cron job created."

  handle-success:
    if: |
      github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.environment == 'Production'
    runs-on: ubuntu-latest
    steps:
      - name: Send immediate Slack success alert
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "✅ Production Deployment Succeeded",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*A Vercel production deployment has completed successfully.*\n\n<https://github.com/${{ github.repository }}/deployments|View Deployments>"
                  }
                }
              ]
            }'

      - name: Delete cron job from cron-job.org
        run: |
          JOBS=$(curl -s -X GET "https://api.cron-job.org/jobs" \
            -H "Authorization: Bearer ${{ secrets.CRON_JOB_ORG_API_KEY }}" \
            -H "Content-Type: application/json")

          # Delete ALL jobs matching the name (handles duplicates safely)
          JOB_IDS=$(echo "$JOBS" | jq -r '
            .jobs[] | select(.title == "vercel-prod-failure-notifier-job") | .jobId
          ')

          if [ -z "$JOB_IDS" ]; then
            echo "No cron job found to delete. Nothing to do."
            exit 0
          fi

          for ID in $JOB_IDS; do
            curl -s -X DELETE "https://api.cron-job.org/jobs/$ID" \
              -H "Authorization: Bearer ${{ secrets.CRON_JOB_ORG_API_KEY }}" \
              -H "Content-Type: application/json"
            echo "Deleted cron job: $ID"
          done
