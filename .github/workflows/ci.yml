name: CI

permissions:
  contents: read
# You can specify job-level permissions as well. It would override this permission level.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:

  validate-branch-name:
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          PATTERN="^OP-[0-9]+-( feature|bug|task)-[a-z0-9_-]+$"
          if [[ ! "$BRANCH" =~ $PATTERN ]]; then
            echo "❌ Invalid branch name: '$BRANCH'"
            echo "Expected format: OP-123-feature-my-branch-name"
            echo "work_type must be one of: feature, bug, task"
            exit 1
          fi
          echo "✅ Branch name is valid: '$BRANCH'"

  validate-pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          # Conventional commit types
          TYPES="feat|fix|chore|docs|style|refactor|perf|test|build|ci|revert"
          # Pattern: type(optional-scope): OP-123 description
          PATTERN="^($TYPES)(\(.+\))?: OP-[0-9]+ .+$"
          if [[ ! "$TITLE" =~ $PATTERN ]]; then
            echo "❌ Invalid PR title: '$TITLE'"
            echo ""
            echo "Expected format:"
            echo "  feat: OP-123 add login page"
            echo "  fix(auth): OP-456 resolve token expiry bug"
            echo ""
            echo "Conventional commit types: $TYPES"
            exit 1
          fi
          echo "✅ PR title is valid: '$TITLE'"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
      with:
        node-version: 22
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  test_coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
      with:
        node-version: 22
      - run: npm ci
      - run: npm run test -- --coverage --coverageThreshold='{"global":{"lines":80}}'

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pr-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Check PR size
        run: |
          LINES=$(git diff origin/${{ github.base_ref }}...HEAD \
          --stat | tail -1 | grep -oP '\d+ insertion' | grep -oP '\d+')
          if [[ "$LINES" -gt 500 ]]; then
            echo "❌ PR is too large ($LINES lines added). Keep PRs under 500 lines for reviewability."
            exit 1
          fi
            echo "✅ PR size is acceptable ($LINES lines)"

  unit_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

#      - name: Run tests
#        run: npm run test

